# ============================================================
# ArgoX 非交互安装配置文件 / Non-interactive install config
# ============================================================
# 使用方法 / Usage:
#   bash <(wget -qO- https://raw.githubusercontent.com/assast/argox/main/argox.sh) -f config.conf
#
# 说明 / Notes:
#   - 留空的变量将使用脚本默认值 / Empty variables fall back to script defaults
#   - 极速模式 (-k/-l) 会忽略本文件，所有参数自动生成
#     Quick mode (-k/-l) ignores this file; all params are auto-generated
# ============================================================


# ── 语言 / Language ──────────────────────────────────────────
# C = 中文 / Chinese，E = 英文 / English
# 留空默认英文 / Default is English if empty
L=''


# ── 协议选择 / Protocol selection ────────────────────────────
# 字母组合，顺序无关，留空 = 仅 e (VLESS + WS)，a = 全部安装
# Letter combination, order-insensitive; empty = e only (VLESS + WS), a = install all
#
#   b = VLESS + Reality Vision
#   c = Hysteria2
#   d = VLESS + Reality gRPC
#   e = VLESS + WS
#   f = VMess + WS
#   g = Trojan + WS
#   h = Shadowsocks + WS
#   i = VLESS + XHTTP  （临时隧道不支持 / not supported on quick tunnel）
#   j = VLESS + XHTTP Direct
#   k = Trojan Direct
#   l = Shadowsocks 2022 Direct
#
# 示例 / Examples:
#   INSTALL_PROTOCOLS='bcefk'  # 只装 Reality Vision + Hysteria2 + VLESS-WS + VMess-WS + Trojan Direct
#   INSTALL_PROTOCOLS='jkl'    # 只装三种直连协议
#   INSTALL_PROTOCOLS='a'      # 全部
#   INSTALL_PROTOCOLS=''       # 仅 e VLESS + WS（默认）
#   INSTALL_PROTOCOLS='e'      # 仅 e VLESS + WS
INSTALL_PROTOCOLS='e'


# ── Argo 隧道 / Argo Tunnel ───────────────────────────────────
# Argo 域名 / Argo domain
# 留空则使用临时隧道 / Use temporary tunnel if empty
# 例如 / e.g.: ARGO_DOMAIN='argo.example.com'
ARGO_DOMAIN=''

# Argo 认证信息（三选一）/ Argo auth (one of three formats)
#
# [Token 格式 / Token format]:
#   ARGO_AUTH='eyJhIjoiOWNjO...'
#
# [Json 格式 / Json format]:
#   ARGO_AUTH='{"AccountTag":"...","TunnelSecret":"...","TunnelID":"..."}'
#
# [API 令牌格式 / API token format - 40位 / 40 chars]:
#   ARGO_AUTH='01ab23cd45ef6789ghij0123klmnopqrs456tuvw'
#
# 留空则使用临时隧道 / Use temporary tunnel if empty
ARGO_AUTH=''


# ── 端口 / Ports ──────────────────────────────────────────────
# 协议内部起始端口（每个协议占 2 个端口：普通 + WARP）
# Starting port (each protocol uses 2 ports: native + WARP)
# 例如选 3 个协议需要 6 个连续空闲端口
# e.g. 3 protocols need 6 consecutive free ports
# 范围 / Range: 100–65520，默认 / Default: 55023
# 留空使用默认值 / Leave empty for default
START_PORT=''

# Nginx 对外端口 / Nginx external port（cloudflared 指向此处）
# 范围 / Range: 100–65520，默认 / Default: 8001
# 仅安装 WS/XHTTP 协议时生效 / Only relevant when WS/XHTTP protocols are installed
NGINX_PORT=''


# ── Reality 配置 / Reality configuration ─────────────────────
# Reality 私钥 / Reality private key
# 留空则随机生成 / Random generation if empty
REALITY_PRIVATE=''


# SNI / TLS 域名（Reality、Hysteria2、Trojan Direct 共用）
# SNI / TLS server name (shared by Reality, Hysteria2 and Trojan Direct)
# 默认 / Default: addons.mozilla.org
TLS_SERVER=''


# ── Hysteria2 端口跳跃 / Hysteria2 port hopping ───────────────
# 格式 / Format: 起始:结束 / start:end，例如 / e.g. 50000:51000
# 范围 / Range: 10000–65535
# 留空则禁用端口跳跃 / Leave empty to disable port hopping
PORT_HOPPING_RANGE=''


# ── WS/XHTTP 优选域名 / Preferred CDN domain ─────────────────
# 填入 CDN 优选域名或 IP / Preferred CDN domain or IP for WS/XHTTP over CDN
# 留空则使用脚本内置第一个 CDN / Default: first CDN in script list (skk.moe)
SERVER=''


# ── Xray 通用参数 / Xray common parameters ────────────────────
# 用户 UUID / User UUID
# 留空则随机生成 / Random generation if empty
UUID=''

# WebSocket / XHTTP 路径 / WebSocket / XHTTP path
# 仅支持字母、数字、- _ . @ / Only letters, numbers, - _ . @
# 留空则默认 argox / Default: argox
WS_PATH=''

# 节点名称 / Node name
# 留空则默认使用 VPS hostname / Default: VPS hostname
NODE_NAME=''


# ── 服务器 IP / Server IP ─────────────────────────────────────
# 支持 IPv4 或 IPv6 / Supports IPv4 or IPv6
# 留空则自动检测 / Auto-detected if empty
# 例如 / e.g.: SERVER_IP='1.2.3.4' 或 SERVER_IP='2001:db8::1'
SERVER_IP=''


# ── WARP 出口 / WARP egress（可选）────────────────────────────
# 默认：安装时自动注册本机独立 free WARP 账号并写入 /etc/argox/custom
# Default: auto-register an independent free WARP account into /etc/argox/custom
#
# 如已有凭证可在此填入，跳过注册 / Fill to skip registration:
# WARP_SECRET_KEY='xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx='
# WARP_ADDR_V4='172.16.0.2/32'
# WARP_ADDR_V6='2606:4700:110:xxxx:xxxx:xxxx:xxxx:xxxx/128'
# WARP_RESERVED='12,34,56'          # client_id 解码后的 3 字节
#
# WireGuard endpoint（建议 IP，域名易受 DNS/拥堵影响）
# Prefer an IP endpoint over engage.cloudflareclient.com
# WARP_ENDPOINT='162.159.192.1:2408'
#
# argox -w 重新注册时最多尝试轮数（每轮：新账号 + 不同 Endpoint）
# Max re-register attempts when running argox -w (new account + rotated endpoint each try)
WARP_REREG_TRIES=1
#
# MTU / keepAlive（双跳 CDN+WARP 建议 1200 / 30）
# WARP_MTU='1200'
# WARP_KEEPALIVE='30'
WARP_SECRET_KEY=''
WARP_ADDR_V4=''
WARP_ADDR_V6=''
WARP_RESERVED=''
WARP_ENDPOINT=''
WARP_MTU=''
WARP_KEEPALIVE=''
WARP_REREG_TRIES=''
